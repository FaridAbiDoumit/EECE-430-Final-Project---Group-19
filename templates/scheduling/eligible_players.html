{% extends "base.html" %}

{% block content %}
<section class="panel">
    <h1>Eligible Players</h1>
    {% if players %}
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                </tr>
            </thead>
            <tbody>
                {% for player in players %}
                    <tr>
                        <td>{{ player.name }}</td>
                        <td>{{ player.email }}</td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    {% else %}
        <p class="muted">No eligible players available.</p>
    {% endif %}
</section>
{% endblock %}
