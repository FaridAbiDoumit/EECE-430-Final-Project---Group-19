<article class="timeline-event">
    <div class="timeline-event-top">
        <h4>{{ timeline_session.title }}</h4>
        <div class="timeline-event-actions">
            <form method="post">
                {% csrf_token %}
                <input type="hidden" name="calendar_action" value="rsvp">
                <input type="hidden" name="session_id" value="{{ timeline_session.id }}">
                <input type="hidden" name="rsvp_status" value="going">
                <input type="hidden" name="year" value="{{ selected_date.year }}">
                <input type="hidden" name="month" value="{{ selected_date.month }}">
                <input type="hidden" name="day" value="{{ selected_date.day }}">
                <button type="submit">Accept</button>
            </form>
            <form method="post">
                {% csrf_token %}
                <input type="hidden" name="calendar_action" value="rsvp">
                <input type="hidden" name="session_id" value="{{ timeline_session.id }}">
                <input type="hidden" name="rsvp_status" value="not_going">
                <input type="hidden" name="year" value="{{ selected_date.year }}">
                <input type="hidden" name="month" value="{{ selected_date.month }}">
                <input type="hidden" name="day" value="{{ selected_date.day }}">
                <button type="submit">Decline</button>
            </form>
        </div>
    </div>
    <p class="timeline-event-row">{{ timeline_session.start_label }} - {{ timeline_session.end_label }}</p>
    <p class="timeline-event-row">{{ timeline_session.location }}</p>
    <div class="timeline-event-links">
        <a href="{% url 'scheduling:session_detail' timeline_session.id %}">Update Details</a>
        <a href="{% url 'scheduling:session_detail' timeline_session.id %}">Participants</a>
    </div>
</article>
