{% if request.user.is_authenticated %}
<style>
  #notif-toast-container {
    position: fixed;
    top: 24px;
    right: 24px;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 14px;
    pointer-events: none;
  }
  .notif-toast {
    pointer-events: auto;
    width: 420px;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 8px 28px rgba(0,0,0,0.22);
    font-family: 'Josefin Sans', sans-serif;
    animation: notif-slide-in 0.3s ease forwards;
  }
  .notif-toast.notif-hiding {
    animation: notif-slide-out 0.35s ease forwards;
  }
  .notif-toast-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #46674f;
    color: #fff;
    padding: 13px 18px;
    font-size: 1.02rem;
    font-weight: 600;
    gap: 8px;
  }
  .notif-toast-title {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .notif-toast-close {
    background: none;
    border: none;
    color: #fff;
    font-size: 1.1rem;
    line-height: 1;
    cursor: pointer;
    padding: 0 2px;
    opacity: 0.8;
    flex-shrink: 0;
    width: auto;
    border-radius: 4px;
  }
  .notif-toast-close:hover { opacity: 1; background: rgba(255,255,255,0.15); }
  .notif-toast-body {
    background: #dedede;
    color: #111;
    padding: 13px 18px 16px;
    font-size: 0.97rem;
    line-height: 1.5;
  }
  .notif-toast-progress {
    height: 3px;
    background: #46674f;
    transform-origin: left;
    animation: notif-progress 10s linear forwards;
  }
  @keyframes notif-slide-in {
    from { opacity: 0; transform: translateX(60px) translateY(-10px); }
    to   { opacity: 1; transform: translateX(0) translateY(0); }
  }
  @keyframes notif-slide-out {
    from { opacity: 1; transform: translateX(0); }
    to   { opacity: 0; transform: translateX(80px); }
  }
  @keyframes notif-progress {
    from { transform: scaleX(1); }
    to   { transform: scaleX(0); }
  }
</style>

<div id="notif-toast-container" aria-live="polite" aria-label="Notifications"></div>

<script>
(function () {
  const POLL_INTERVAL = 12000; // ms
  const DISMISS_AFTER = 10000; // ms
  const STORAGE_KEY = 'shown_notif_ids';
  const ENDPOINT = '{% url "scheduling:notifications_popup_data" %}';

  function getShown() {
    try { return new Set(JSON.parse(sessionStorage.getItem(STORAGE_KEY) || '[]')); }
    catch { return new Set(); }
  }

  function saveShown(set) {
    try { sessionStorage.setItem(STORAGE_KEY, JSON.stringify([...set])); } catch {}
  }

  function dismissToast(toast) {
    if (toast.dataset.dismissed) return;
    toast.dataset.dismissed = '1';
    clearTimeout(toast._timer);
    toast.classList.add('notif-hiding');
    toast.addEventListener('animationend', () => toast.remove(), { once: true });
  }

  function showToast(n) {
    const container = document.getElementById('notif-toast-container');
    if (!container) return;

    const toast = document.createElement('div');
    toast.className = 'notif-toast';
    toast.innerHTML =
      '<div class="notif-toast-header">' +
        '<span class="notif-toast-title">' + escHtml(n.title) + '</span>' +
        '<button class="notif-toast-close" aria-label="Close notification">&times;</button>' +
      '</div>' +
      '<div class="notif-toast-body">' + escHtml(n.message) + '</div>' +
      '<div class="notif-toast-progress"></div>';

    toast.querySelector('.notif-toast-close').addEventListener('click', () => dismissToast(toast));
    container.appendChild(toast);

    toast._timer = setTimeout(() => dismissToast(toast), DISMISS_AFTER);
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function poll() {
    fetch(ENDPOINT, { credentials: 'same-origin' })
      .then(function(r) { if (r.ok) return r.json(); })
      .then(function(data) {
        if (!data) return;
        var shown = getShown();
        data.notifications.forEach(function(n) {
          if (!shown.has(n.id)) {
            shown.add(n.id);
            showToast(n);
          }
        });
        saveShown(shown);
      })
      .catch(function() {}); // silently ignore network errors
  }

  document.addEventListener('DOMContentLoaded', function() {
    poll();
    setInterval(poll, POLL_INTERVAL);
  });
})();
</script>
{% endif %}
