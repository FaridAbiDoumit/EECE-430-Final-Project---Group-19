<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Record Match | Volley Project</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --forest: #3f5e4a;
            --paper: #d9d9d9;
            --ink: #111111;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            background: var(--forest);
            color: var(--ink);
            font-family: 'Josefin Sans', sans-serif;
        }
        a { color: inherit; }
        .form-shell {
            max-width: 600px;
            margin: 60px auto;
            background: var(--paper);
            border-radius: 14px;
            padding: 32px 28px;
        }
        .form-shell h1 {
            margin: 0 0 20px;
            font-size: 1.8rem;
        }
        .form-shell label {
            display: block;
            margin-top: 14px;
            font-weight: 500;
        }
        .form-shell input,
        .form-shell textarea,
        .form-shell select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #999;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            margin-top: 4px;
        }
        .form-shell button {
            margin-top: 22px;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #111;
            color: #fff;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        .form-shell button:hover { background: #333; }
        .back-link {
            display: inline-block;
            margin-top: 16px;
            font-size: 0.95rem;
        }
        .errorlist {
            list-style: none; padding: 0; margin: 6px 0 0;
            color: #c00; font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="form-shell">
        <h1>Record Match Result</h1>
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}<ul class="errorlist">{% for e in field.errors %}<li>{{ e }}</li>{% endfor %}</ul>{% endif %}
            {% endfor %}
            <button type="submit">Save Match &amp; Add Player Stats</button>
        </form>
        <a class="back-link" href="{% url 'scheduling:team_stats' %}">← Back to Team Stats</a>
    </div>
</body>
</html>
